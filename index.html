<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrs. Rapp's Spring English Hub 🌸</title>
    <style>
        /* Bouncy Retro-Y2K Font Stack - based on image_1.png and image_3.png vibes */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Bungee&family=Nunito:wght@400;800&display=swap');

        body {
            /* VIBRANT & EXCITED: 
               Background gradient from Sky Blue (#00f2fe from image_3.png) 
               to Peachy-Pink (#ff007a from image_1.png and image_2.png) 
            */
            background: linear-gradient(135deg, #00f2fe 0%, #fdfbfb 40%, #fff1eb 70%, #ff007a 100%);
            background-attachment: fixed;
            color: #1e293b; 
            font-family: 'Nunito', sans-serif; 
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            overflow: hidden; /* Stops scrolling to keep graphics static */
            position: relative;
        }

        /* --- STATIC (NON-FLOATING) BACKGROUND GRAPHICS --- */
        .static-vibe-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2; /* Stays behind everything */
            pointer-events: none;
        }

        /* Image_1.png flower style - Top Left */
        .top-flower-graphic {
            position: absolute;
            width: 150px;
            top: 5%;
            left: 5%;
            opacity: 0.15; /* Subdued so it's clearly a background element */
            filter: hue-rotate(20deg); /* Adjusts lavender to a teal/cyan vibe */
        }

        /* Image_4.png notebook style - Top Right */
        .notebook-graphic {
            position: absolute;
            width: 180px;
            top: 10%;
            right: 8%;
            opacity: 0.12;
            transform: rotate(15deg);
        }

        /* Image_2.png pencil/paper style - Bottom Left */
        .bottom-gear-graphic {
            position: absolute;
            width: 160px;
            bottom: 5%;
            left: 8%;
            opacity: 0.1;
            transform: rotate(-10deg);
        }

        /* Image_3.png smiley/rainbow style - Bottom Right */
        .smiley-graphic {
            position: absolute;
            width: 170px;
            bottom: 8%;
            right: 5%;
            opacity: 0.15;
            filter: brightness(1.2); /* Boosts the yellow *center* from images */
        }

        /* --- Header: Bouncy & Layered, very Gen-Z --- */
        h1 { 
            font-family: 'Bungee', cursive;
            font-size: 4.5rem;
            margin-bottom: 5px;
            color: #ff007a; /* Neon Pink */
            text-shadow: 
                4px 4px 0px #00f2fe, /* Neon Cyan Layer */
                8px 8px 0px rgba(0,0,0,0.1);
            letter-spacing: -2px;
            -webkit-text-stroke: 1.5px white; /* Chic outline */
        }

        h2 { 
            font-family: 'Fredoka', sans-serif;
            color: #334155; /* Soft Dark Slate */
            font-size: 1.25rem; 
            margin-top: 0;
            margin-bottom: 60px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.7); /* Readable background panel */
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
        }

        .assignment-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 28px;
            align-items: center;
        }

        .assignment-item {
            width: 100%;
            max-width: 580px;
        }

        /* --- CHIC & EXCITED DOUBLE BORDERS --- */
        .assignment-link {
            display: block;
            text-decoration: none;
            padding: 22px;
            border-radius: 20px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.9); /* Solid white/very readable card */
            color: #0f172a; /* Main text */
            
            /* The Base Double Border - using image center yellow from image_1.png/image_4.png */
            border: 6px double rgba(15, 23, 42, 0.2); 
            box-shadow: 10px 10px 0px #ff007a; /* 3D Pink Shadow Panel */
            position: relative;
        }

        /* --- Hover State: EXPLOSIVE COLOR CHANGE --- */
        .assignment-link:hover {
            transform: translate(-5px, -5px) scale(1.02);
            background: #0f172a; /* Dark card panel pops */
            color: white; /* Contrast text pops */
            border-color: #00f2fe; /* Base border pops to Cyan */
            box-shadow: 15px 15px 0px rgba(0,0,0,0.3); /* Panel moves/shadow fades */
        }

        /* Adds a secondary inner glitter ring *only* on hover */
        .assignment-link:hover::after {
            content: '';
            position: absolute;
            top: 4px; bottom: 4px; left: 4px; right: 4px;
            border: 2px dashed #ff007a; /* Pink/Red 'leopard' texture on inner ring */
            border-radius: 14px;
            pointer-events: none;
        }

    </style>
</head>
<body>

  <div class="static-vibe-layer">
    <img src="https://i.ibb.co/VDPgDms/image-1.png" class="top-flower-graphic">
    <img src="https://i.ibb.co/sK6t3Wz/image-4.png" class="notebook-graphic">
    <img src="https://i.ibb.co/6y4tW6j/image-2.png" class="bottom-gear-graphic">
    <img src="https://i.ibb.co/6y4tW6j/image-3.png" class="smiley-graphic">
  </div>

    <div class="hub-container">
        <h1>Mrs. Rapp 🌸 English Bloom</h1>
        
        <h2>Explore a Unit &centerdot; Submit your PDF to Ekadence!</h2>

        <ul class="assignment-list">
            <li class="assignment-item">
                <a href="Night Novel Study/index.html" class="assignment-link">
                    Night Novel Study
                </a>
            </li>

            <li class="assignment-item">
                <a href="Romeo&Juliet/index.html" class="assignment-link">
                    Romeo & Juliet Unit
                </a>
            </li>

            <li class="assignment-item">
                <a href="5C=Character/index.html" class="assignment-link">
                    5C Lessons
                </a>
            </li>

            <li class="assignment-item">
                <a href="BrainBreaks/index.html" class="assignment-link">
                    Self-Monitored Break Zone
                </a>
            </li>
        </ul>
    </div>

</body>
</html>
