<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Mrs. Rapp's Education Specialist Hub</title>
    <style>
        /* General Page Styling */
        body {
            background-color: #0d0e15; /* Deep dark background for glow effect */
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 50px;
        }

        .hub-container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header Styling: Larger with underline */
        h1 { 
            font-size: 3.2rem;
            color: #ffffff; 
            border-bottom: 4px solid #bc13fe; 
            padding-bottom: 15px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(188, 19, 254, 0.6);
        }

        /* Subheading Styling: Smaller */
        h2 { 
            color: #a0aec0; 
            font-size: 1.4rem; 
            margin-bottom: 40px;
            font-weight: normal;
        }

        .assignment-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 25px; /* Space between buttons */
            align-items: center;
        }

        .assignment-item {
            width: 100%;
            max-width: 600px;
        }

        /* Base Button Styling */
        .assignment-link {
            display: block;
            text-decoration: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            background: rgba(26, 28, 41, 0.8);
            border: 3px solid transparent;
        }

        /* Hover Effect for all buttons */
        .assignment-link:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

       /* A respectful, memorial-style glow */
.pink-glow {
    color: #ffd1dc;
    border: 1px solid rgba(255, 209, 220, 0.5); /* 50% transparent border */
    border-radius: 4px;
    /* This shadow is wider but "softer" (less bright) */
    box-shadow: 0 0 10px rgba(255, 209, 220, 0.2); 
    background-color: rgba(255, 209, 220, 0.05); /* Very faint background tint */
    padding: 15px;
    transition: all 0.5s ease;
}

.pink-glow:hover {
    /* When they hover, it brightens just a tiny bit, like a candle catching a breeze */
    border-color: rgba(255, 209, 220, 0.8);
    box-shadow: 0 0 15px rgba(255, 209, 220, 0.4);
}

        .mint-glow {
            color: #b2fba5;
            border-color: #b2fba5;
            box-shadow: 0 0 15px #b2fba5, inset 0 0 5px #b2fba5;
        }

        .lavender-glow {
            color: #e1bee7;
            border-color: #e1bee7;
            box-shadow: 0 0 15px #e1bee7, inset 0 0 5px #e1bee7;
        }

        .blue-glow {
            color: #b3e5fc;
            border-color: #b3e5fc;
            box-shadow: 0 0 15px #b3e5fc, inset 0 0 5px #b3e5fc;
        }
