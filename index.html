<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrs. Rapp's English Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap');

        body {
            /* Crisp & Feminine: Soft Lavender to Peachy-Pink Glow */
            background: linear-gradient(135deg, #fdfcfb 0%, #e2d1f9 40%, #fff1eb 100%);
            background-attachment: fixed;
            color: #4a4a4a; /* Modern Soft Charcoal */
            font-family: 'Poppins', sans-serif; 
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Floating Hearts/Sparkles (Feminine Drift) --- */
        .quote-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-quote {
            position: absolute;
            color: rgba(214, 158, 255, 0.3); /* Lavender Mist */
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            animation: drift linear infinite;
        }

        @keyframes drift {
            from { transform: translateX(100vw) rotate(0deg); }
            to { transform: translateX(-110%) rotate(10deg); }
        }

        /* --- Header: Crisp & Stylized --- */
        h1 { 
            font-family: 'Montserrat', sans-serif;
            font-size: 3.2rem;
            margin-bottom: 5px;
            color: #7c3aed; /* Vibrant Purple */
            letter-spacing: -1px;
            text-shadow: 2px 2px 0px #ffffff, 4px 4px 15px rgba(124, 58, 237, 0.2);
        }

        h2 { 
            font-family: 'Dancing Script', cursive; /* Fun Teacher Script */
            color: #db2777; /* Deep Pink/Berry */
            font-size: 1.8rem; 
            margin-bottom: 50px;
            margin-top: 0;
        }

        .assignment-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .assignment-item {
            width: 100%;
            max-width: 550px;
        }

        /* --- Button Styling: Clean Glass & Soft Borders --- */
        .assignment-link {
            display: block;
            text-decoration: none;
            padding: 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1.25rem;
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid #fbcfe8; /* Soft Pink Border */
            color: #5b21b6; /* Deep Purple Text */
            box-shadow: 0 4px 15px rgba(219, 39, 119, 0.05);
        }

        /* --- Hover State: Berry-Pink Pop --- */
        .assignment-link:hover {
            transform: translateY(-5px);
            background: #ffffff;
            border-color: #db2777; /* Berry Pink */
            color: #db2777;
            animation: pulse-pink 1.5s infinite;
            box-shadow: 0 10px 25px rgba(219, 39, 119, 0.2);
        }

        @keyframes pulse-pink {
            0% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(219, 39, 119, 0); }
            100% { box-shadow: 0 0 0 0 rgba(219, 39, 119, 0); }
        }

        .break-link {
            border-style: dashed; /* Playful dashed border for break zone */
        }

    </style>
</head>
<body>

    <div class="quote-layer">
        <div class="floating-quote" style="top: 15%; animation-duration: 40s;">"You've got this! ✨"</div>
        <div class="floating-quote" style="top: 35%; animation-duration: 50s; animation-delay: -5s;">"Your voice matters 💖"</div>
        <div class="floating-quote" style="top: 55%; animation-duration: 45s; animation-delay: -15s;">"Dream big, write often 🖋️"</div>
        <div class="floating-quote" style="top: 75%; animation-duration: 55s;">"Make today beautiful 🌸"</div>
        <div class="floating-quote" style="top: 90%; animation-duration: 35s; animation-delay: -10s;">"Always believe in yourself!"</div>
    </div>

    <div class="hub-container">
        <h1>Mrs. Rapp's English Dashboard</h1>
        <h2>Where stories come to life...</h2>

        <ul class="assignment-list">
            <li class="assignment-item">
                <a href="Night by Elie Wiesel Novel Study/index.html" class="assignment-link">
                    Night Novel Study
                </a>
            </li>

            <li class="assignment-item">
                <a href="Romeo&Juliet/index.html" class="assignment-link">
                    Romeo & Juliet Unit
                </a>
            </li>

            <li class="assignment-item">
                <a href="5C=Character/index.html" class="assignment-link">
                    5C Lessons
                </a>
            </li>

            <li class="assignment-item">
                <a href="BrainBreaks/index.html" class="assignment-link break-link">
                    Self-Monitored Break Zone
                </a>
            </li>
        </ul>
    </div>

</body>
</html>
