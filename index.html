<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrs. Rapp's Spring English Hub 🌸</title>
    <style>
        /* Trendy Retro & Bubbly Font Stack */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Bungee&family=Nunito:wght@400;800&display=swap');

        body {
            /* Vibrant Spring Morning: Bright Sky to Soft Peach */
            background: linear-gradient(135deg, #00f2fe 0%, #fdfbfb 45%, #fff1eb 75%, #ff007a 100%);
            background-attachment: fixed;
            color: #1e293b; 
            font-family: 'Nunito', sans-serif; 
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Floating Retro-Spring Graphics --- */
        .vibe-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-element {
            position: absolute;
            font-size: 3rem;
            animation: floatUp linear infinite;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.1));
        }

        .floating-affirmation {
            position: absolute;
            color: #ff007a; /* Hot Pink */
            font-family: 'Fredoka', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            white-space: nowrap;
            animation: driftAcross linear infinite;
            text-shadow: 2px 2px 0px white;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
        }

        @keyframes driftAcross {
            0% { transform: translateX(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(100vw); opacity: 0; }
        }

        /* --- Header: Bubbly, Vibrant & Layered --- */
        h1 { 
            font-family: 'Bungee', cursive;
            font-size: 4rem;
            margin-bottom: 5px;
            color: #00f2fe; /* Electric Teal */
            text-shadow: 4px 4px 0px #ff007a, 8px 8px 0px rgba(0,0,0,0.1);
            -webkit-text-stroke: 1px white;
        }

        h2 { 
            font-family: 'Fredoka', sans-serif;
            color: #334155;
            font-size: 1.3rem; 
            margin-top: 0;
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.6);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
        }

        .assignment-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .assignment-item {
            width: 100%;
            max-width: 580px;
        }

        /* --- GLOWING CHIC DOUBLE BORDERS --- */
        .assignment-link {
            display: block;
            text-decoration: none;
            padding: 22px;
            border-radius: 25px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.5rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #ffffff; 
            color: #0f172a; 
            
            /* The Animated Double Border Style */
            border: 6px double #ff007a;
            box-shadow: 10px 10px 0px #00f2fe;
            position: relative;
        }

        /* --- Hover State: Border Swap & Glow --- */
        .assignment-link:hover {
            transform: translate(-5px, -5px);
            background: #0f172a; /* Dark Contrast */
            color: white; 
            border-color: #00f2fe; /* Border changes to Teal */
            box-shadow: 15px 15px 0px #ff007a; /* Shadow changes to Pink */
        }

        /* Inner Glitter Ring on Hover */
        .assignment-link:hover::after {
            content: '';
            position: absolute;
            top: 4px; bottom: 4px; left: 4px; right: 4px;
            border: 2px dashed #ff007a;
            border-radius: 18px;
            pointer-events: none;
        }

    </style>
</head>
