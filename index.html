<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrs. Rapp's English Bloom</title>
    <style>
        /* Bubbly & Energetic Font Stack */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@700&family=Bubblegum+Sans&family=Poppins:wght@400;700&display=swap');

        body {
            /* Vibrant Daylight: Sky Blue to Sun-Kissed Yellow */
            background: linear-gradient(135deg, #0ea5e9 0%, #f0f9ff 35%, #fff7ed 70%, #fef3c7 100%);
            background-attachment: fixed;
            color: #1e293b; 
            font-family: 'Poppins', sans-serif; 
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Floating Vibrant Elements & Affirmations --- */
        .spring-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-element {
            position: absolute;
            font-size: 2.2rem;
            animation: driftUp linear infinite;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.1));
        }

        .floating-affirmation {
            position: absolute;
            color: #0d9488; /* Vibrant Teal */
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            white-space: nowrap;
            animation: driftUp linear infinite;
            opacity: 0.6;
        }

        @keyframes driftUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* --- High-Energy Bubbly Header --- */
        h1 { 
            font-family: 'Bubblegum Sans', cursive;
            font-size: 4.2rem;
            margin-bottom: 5px;
            color: #f43f5e; /* Vibrant Coral-Pink */
            text-shadow: 3px 3px 0px #ffffff, 6px 6px 15px rgba(244, 63, 94, 0.3);
        }

        h2 { 
            font-family: 'Fredoka', sans-serif;
            color: #0369a1; /* Deep Sky Blue */
            font-size: 1.3rem; 
            margin-top: 0;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .assignment-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .assignment-item {
            width: 100%;
            max-width: 580px;
        }

        /* --- CHIC DOUBLE BORDERS (VIBRANT) --- */
        .assignment-link {
            display: block;
            text-decoration: none;
            padding: 22px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 1.4rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #ffffff; 
            color: #0f172a; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            
            /* The Chic Double Border Style */
            border: 6px double #06b6d4; /* Vibrant Cyan Double Border */
            position: relative;
        }

        /* --- Hover State: Explosive Color & Double Ring --- */
        .assignment-link:hover {
            transform: translateY(-10px) scale(1.02);
            background: #ffffff;
            color: #f43f5e; /* Coral Text on Hover */
            border-color: #fbbf24; /* Sunny Yellow Double Border */
            box-shadow: 0 20px 40px rgba(244, 63, 94, 0.2);
        }

        /* The Inner Chic Ring on Hover */
        .assignment-link:hover::after {
            content: '';
            position: absolute;
            top: 4px; bottom: 4px; left: 4px; right: 4px;
            border: 2px solid #f43f5e; /* Coral Inner Ring */
            border-radius: 12px;
            pointer-events: none;
            opacity: 0.4;
        }

    </style>
</head>
<body>

    <div class="spring-layer">
        <div class="floating-element" style="left: 10%; bottom: -10%; animation-duration: 15s;">📚</div>
        <div class="floating-element" style="left: 30%; bottom: -20%; animation-duration: 20s; animation-delay: -5s;">🌼</div>
        <div class="floating-element" style="left: 50%; bottom: -15%; animation-duration: 18s; animation-delay: -2s;">🎨</div>
        <div class="floating-element" style="left: 70%; bottom: -25%; animation-duration: 22s; animation-delay: -10s;">🌞</div>
        <div class="floating-element" style="left: 90%; bottom: -10%; animation-duration: 17s; animation-delay: -7s;">🌻</div>
        <div class="floating-element" style="left: 15%; bottom: -25%; animation-duration: 25s;">📖</div>
        
        <div class="floating-affirmation" style="top: 15%; animation-duration: 30s;">"You've got this! ✨"</div>
        <div class="floating-affirmation" style="top: 35%; animation-duration: 40s; animation-delay: -5s;">"Your voice is powerful."</div>
        <div class="floating-affirmation" style="top: 55%; animation-duration: 35s; animation-delay: -15s;">"Today is a new chapter."</div>
        <div class="floating-affirmation" style="top: 75%; animation-duration: 45s;">"Bloom where you are planted 🌸"</div>
        <div class="floating-affirmation" style="top: 90%; animation-duration: 28s; animation-delay: -10s;">"Stay amazing! 💖"</div>
    </div>

</body>
</html>
