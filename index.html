<!DOCTYPE html>

<head>

    <title>Mrs. Rapp's Education Specialist Hub</title>
    <style>
        /* General Page Styling */
        body {
            background-color: #0d0e15; /* Deep dark background */
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 50px;
            margin: 0;
        }

        .hub-container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* Header Styling */
        h1 { 
            font-size: 3.2rem;
            color: #ffffff; 
            border-bottom: 4px solid #bc13fe; 
            padding-bottom: 15px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(188, 19, 254, 0.6);
        }

        h2 { 
            color: #a0aec0; 
            font-size: 1.4rem; 
            margin-bottom: 40px;
            font-weight: normal;
        }

        .assignment-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .assignment-item {
            width: 100%;
            max-width: 600px;
        }

        /* Base Button Styling */
        .assignment-link {
            display: block;
            text-decoration: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            background: #1a1c29; /* Solid dark background to prevent graying out */
            border: 3px solid transparent;
        }

        .assignment-link:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
        }

        /* The Moon Yellow Glow for Night */
        .yellow-glow {
            color: #fff9c4 !important;
            border-color: #fff9c4 !important;
            box-shadow: 0 0 15px #fff9c4, inset 0 0 5px #fff9c4;
            text-shadow: 0 0 8px rgba(255, 249, 196, 0.7);
        }

        .mint-glow {
            color: #b2fba5;
            border-color: #b2fba5;
            box-shadow: 0 0 15px #b2fba5, inset 0 0 5px #b2fba5;
        }

        .lavender-glow {
            color: #e1bee7;
            border-color: #e1bee7;
            box-shadow: 0 0 15px #e1bee7, inset 0 0 5px #e1bee7;
        }

        .blue-glow {
            color: #b3e5fc;
            border-color: #b3e5fc;
            box-shadow: 0 0 15px #b3e5fc, inset 0 0 5px #b3e5fc;
        }

    </style>
</head>
