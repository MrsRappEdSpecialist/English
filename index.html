<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mrs. Rapp's Playful Dashboard</title>
    <style>
        /* Modern, Bubbly & Fun Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;700&family=Bubblegum+Sans&display=swap');

        body {
            /* Soft, Sunny Pastel Glow Background */
            background: linear-gradient(135deg, #fdfbfb 0%, #ebf8e1 50%, #fde4e4 100%);
            background-attachment: fixed;
            color: #4a5568; /* Charcoal for high readability */
            font-family: 'Fredoka', sans-serif; /* Bouncy but clean font stack */
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Floating Playful Book Background --- */
        .book-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-element {
            position: absolute;
            color: rgba(74, 114, 255, 0.08); /* Muted playful blue */
            font-size: 2rem;
            animation: driftUp linear infinite;
        }

        @keyframes driftUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* --- Bubbly Header: Bright and Happy --- */
        h1 { 
            font-family: 'Bubblegum Sans', cursive;
            font-size: 4rem;
            margin-bottom: 5px;
            color: #ff6b6b; /* Playful Coral Red */
            text-shadow: 2px 2px 0px #ffffff, 4px 4px 10px rgba(0,0,0,0.1);
        }

        h2 { 
            color: #718096; 
            font-size: 1.3rem; 
            margin-top: 0;
            margin-bottom: 50px;
            font-weight: 400;
        }

        .assignment-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .assignment-item {
            width: 100%;
            max-width: 550px;
        }

        /* --- Bouncy, Playful Button Styling --- */
        .assignment-link {
            display: block;
            text-decoration: none;
            padding: 20px;
            border-radius: 20px; /* Fully rounded 'pill' buttons */
            font-weight: 700;
            font-size: 1.3rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(255, 255, 255, 0.85); /* Semi-transparent white */
            backdrop-filter: blur(5px);
            color: #2d3748; /* Contrast for readability */
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-style: solid;
        }

        /* --- Bubbly Hover State --- */
        .assignment-link:hover {
            transform: translateY(-8px) scale(1.05);
            background: #ffffff;
            color: #ff6b6b;
            box-shadow: 0 15px 30px rgba(255, 107, 107, 0.2);
            animation: bounceIn 0.5s ease-out;
        }

        @keyframes bounceIn {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            70% { transform: translateY(2px); }
            100% { transform: translateY(0); }
        }

        /* --- UNIQUE BORDER COLORS --- */
        .link-mint { border-width: 4px; border-color: #81e6d9; /* Mint */ }
        .link-blue { border-width: 4px; border-color: #63b3ed; /* Sky Blue */ }
        .link-purple { border-width: 4px; border-color: #b794f4; /* Lavender */ }
        .link-peach { border-width: 4px; border-color: #f6ad55; /* Peach */ }

    </style>
</head>
<body>

    <div class="book-layer">
        <div class="floating-element" style="left: 10%; bottom: -10%; animation-duration: 18s;">📚</div>
        <div class="floating-element" style="left: 25%; bottom: -20%; animation-duration: 22s; animation-delay: -5s;">✏️</div>
        <div class="floating-element" style="left: 40%; bottom: -15%; animation-duration: 20s; animation-delay: -2s;">⭐</div>
        <div class="floating-element" style="left: 55%; bottom: -25%; animation-duration: 25s; animation-delay: -10s;">📖</div>
        <div class="floating-element" style="left: 70%; bottom: -10%; animation-duration: 19s; animation-delay: -7s;">✒️</div>
        <div class="floating-element" style="left: 85%; bottom: -20%; animation-duration: 21s;">📚</div>
    </div>

    <div class="hub-container">
        <h1>Mrs. Rapp's Dashboard</h1>
        <h2>Explore a Unit &centerdot; Submit your PDF to Ekadence!</h2>

        <ul class="assignment-list">
            <li class="assignment-item">
                <a href="Night by Elie Wiesel Novel Study/index.html" class="assignment-link link-mint">
                    Night Novel Study
                </a>
            </li>

            <li class="assignment-item">
                <a href="Romeo&Juliet/index.html" class="assignment-link link-blue">
                    Romeo & Juliet Unit
                </a>
            </li>

            <li class="assignment-item">
                <a href="5C=Character/index.html" class="assignment-link link-purple">
                    5C Lessons
                </a>
            </li>

            <li class="assignment-item">
                <a href="BrainBreaks/index.html" class="assignment-link link-peach">
                    Self-Monitored Break Zone
                </a>
            </li>
        </ul>
    </div>

</body>
</html>
