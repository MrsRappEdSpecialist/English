<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romeo & Juliet Unit</title>
    <style>
        /* Importing Dramatic & Classic Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        body {
            /* Tragic Midnight to Crimson Gradient */
            background: linear-gradient(135deg, #020617 0%, #1e1b4b 50%, #4c0519 100%);
            background-attachment: fixed;
            color: #f8fafc;
            font-family: 'Lora', serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Falling Rose Petals Background --- */
        .petal-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* Pure CSS Rose Petal Shape */
        .petal {
            position: absolute;
            width: 15px;
            height: 15px;
            background: #9f1239; /* Deep Crimson */
            border-radius: 15px 0 15px 0; /* Creates a petal/teardrop shape */
            opacity: 0.6;
            box-shadow: 0 0 10px rgba(159, 18, 57, 0.5);
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
            10% { opacity: 0.7; }
            90% { opacity: 0.7; }
            100% { transform: translateY(110vh) rotate(360deg) translateX(50px); opacity: 0; }
        }

        /* --- Glassmorphism Container --- */
        .hub-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 50px 30px;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* --- Dramatic Shakespearean Header --- */
        h2 {
            font-family: 'Cinzel Decorative', serif;
            font-size: 3rem;
            margin-bottom: 40px;
            color: #fef3c7; /* Pale parchment/gold */
            letter-spacing: 2px;
            text-shadow: 
                0 0 15px rgba(225, 29, 72, 0.6),
                0 4px 4px rgba(0,0,0,0.8);
        }

        .unit-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .unit-item {
            width: 100%;
        }

        /* --- Elegant Thematic Links --- */
        .unit-link {
            display: block;
            text-decoration: none;
            padding: 20px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 1px;
            transition: all 0.4s ease;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(225, 29, 72, 0.2);
            border-left: 4px solid #be123c; /* Blood red accent line */
            color: #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        /* --- Hover State: Crimson Glow --- */
        .unit-link:hover {
            transform: translateY(-3px);
            background: rgba(190, 18, 60, 0.15); /* Subtle red tint */
            border-color: #be123c;
            color: #fef3c7;
            box-shadow: 0 10px 20px rgba(159, 18, 57, 0.3);
        }

        /* --- Back Button --- */
        .back-btn {
            display: inline-block;
            margin-top: 50px;
            color: #94a3b8;
            text-decoration: none;
            font-style: italic;
            font-size: 1rem;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: #fef3c7;
            border-bottom: 1px solid #fef3c7;
        }

    </style>
</head>
<body>

    <div class="petal-layer">
        <div class="petal" style="left: 10%; animation-duration: 12s; animation-delay: 0s;"></div>
        <div class="petal" style="left: 25%; animation-duration: 18s; animation-delay: -5s; width: 12px; height: 12px;"></div>
        <div class="petal" style="left: 45%; animation-duration: 15s; animation-delay: -2s; width: 18px; height: 18px;"></div>
        <div class="petal" style="left: 65%; animation-duration: 20s; animation-delay: -10s;"></div>
        <div class="petal" style="left: 85%; animation-duration: 14s; animation-delay: -7s; width: 10px; height: 10px;"></div>
        <div class="petal" style="left: 95%; animation-duration: 17s; animation-delay: -3s;"></div>
    </div>

    <div class="hub-container">
        <h2>Romeo & Juliet</h2>

        <ul class="unit-list">
            <li class="unit-item">
                <a href="characters.html" class="unit-link">R&J Character Intro</a>
            </li>
            <li class="unit-item">
                <a href="sonnet130v2.html" class="unit-link">Sonnet 130 Modern Translation</a>
            </li>
            <li class="unit-item">
                <a href="R&JBlackout.html" class="unit-link">Blackout Poetry</a>
            </li>
             <li class="unit-item">
                <a href="videopta.html" class="unit-link">R&J Video Project Resources</a>
            </li>
             <li class="unit-item">
                <a href="rjgame.html" class="unit-link">R&J Game</a>
            </li>
        </ul>

        <p><a href="../index.html" class="back-btn">← Return to the Main Classroom</a></p>
    </div>

</body>
</html>
