<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romeo & Juliet Unit</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;700&display=swap');

        body {
            /* Romantic Midnight Palette: Velvet Purple to Deep Navy */
            background: radial-gradient(circle at top, #4c1d95 0%, #1e1b4b 50%, #0f172a 100%);
            background-attachment: fixed;
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Floating Hearts Background --- */
        .heart-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-heart {
            position: absolute;
            color: rgba(251, 113, 133, 0.2); /* Soft Rose Pink */
            font-size: 1.5rem;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* --- 3D Romantic Header --- */
        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            color: #fda4af; /* Rose Pink */
            text-shadow: 
                0 1px 0 #e11d48,
                0 2px 0 #be123c,
                0 3px 0 #881337,
                0 10px 20px rgba(0,0,0,0.6);
        }

        .unit-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .unit-item {
            width: 100%;
            max-width: 500px;
        }

        /* --- Romantic Link Styling --- */
        .unit-link {
            display: block;
            text-decoration: none;
            padding: 20px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1.3rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid #fda4af;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* --- Hover State: Rose Glow --- */
        .unit-link:hover {
            transform: translateY(-5px) scale(1.05);
            background: #fda4af;
            color: #4c1d95;
            box-shadow: 0 0 25px rgba(253, 164, 175, 0.6);
            animation: pulse-heart 1.5s infinite;
        }

        @keyframes pulse-heart {
            0% { box-shadow: 0 0 0 0 rgba(253, 164, 175, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(253, 164, 175, 0); }
            100% { box-shadow: 0 0 0 0 rgba(253, 164, 175, 0); }
        }

        /* --- Back Button --- */
        .back-btn {
            display: inline-block;
            margin-top: 50px;
            color: #cbd5e1;
            text-decoration: none;
            font-weight: 400;
            font-size: 1rem;
            border-bottom: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            color: #fda4af;
            border-bottom: 1px solid #fda4af;
        }

    </style>
</head>
<body>

    <div class="heart-layer">
        <div class="floating-heart" style="left: 10%; bottom: -10%; animation-duration: 15s;">❤</div>
        <div class="floating-heart" style="left: 25%; bottom: -20%; animation-duration: 20s; animation-delay: -5s;">❣</div>
        <div class="floating-heart" style="left: 45%; bottom: -15%; animation-duration: 18s; animation-delay: -2s;">❤</div>
        <div class="floating-heart" style="left: 70%; bottom: -25%; animation-duration: 22s; animation-delay: -10s;">❣</div>
        <div class="floating-heart" style="left: 85%; bottom: -10%; animation-duration: 17s; animation-delay: -7s;">❤</div>
    </div>

    <div class="hub-container">
        <h2>Romeo & Juliet Unit</h2>

        <ul class="unit-list">
            <li class="unit-item">
                <a href="sonnet130.html" class="unit-link">Sonnet 130</a>
            </li>
            <li class="unit-item">
                <a href="sonnet130v2.html" class="unit-link">Sonnet 130 Version 2</a>
            </li>
            <li class="unit-item">
                <a href="R&JBlackout.html" class="unit-link">Romeo & Juliet Blackout Poetry</a>
            </li>
        </ul>

        <p><a href="../index.html" class="back-btn">← Back to Main Classroom Menu</a></p>
    </div>

</body>
</html>
