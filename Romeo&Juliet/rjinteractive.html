 <head>

  <title>Romeo &amp; Juliet Learning Lab</title>

  <style>
html, body { height: 100%; margin: 0; }
* { box-sizing: border-box; }

:root {
  --bg-primary: #1a0a1e;
  --bg-secondary: #2d1233;
  --bg-card: #3a1a42;
  --text-primary: #f5e6fa;
  --text-secondary: #c9a0d4;
  --accent-primary: #e63946;
  --accent-secondary: #d4a574;
  --accent-gold: #f4c542;
  --border-color: #5a2d6a;
  --success: #4ade80;
  --error: #f87171;
}

.theme-readable {
  --bg-primary: #fefefe;
  --bg-secondary: #f0f0f0;
  --bg-card: #ffffff;
  --text-primary: #1a1a1a;
  --text-secondary: #444444;
  --accent-primary: #0055aa;
  --accent-secondary: #006644;
  --accent-gold: #b8860b;
  --border-color: #cccccc;
  --success: #2d8a4e;
  --error: #cc3333;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  transition: all 0.4s ease;
}

.font-body { font-family: 'Nunito', sans-serif; }
.font-literary { font-family: 'Crimson Text', serif; }
.font-dyslexic { font-family: 'OpenDyslexic', sans-serif !important; }

.glass-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 16px;
  backdrop-filter: blur(10px);
  transition: all 0.3s ease;
}
.glass-card:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(230,57,70,0.15); }

.btn-primary {
  background: var(--accent-primary);
  color: #fff;
  padding: 10px 24px;
  border-radius: 12px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary:hover { filter: brightness(1.15); transform: scale(1.03); }
.btn-primary:focus { outline: 3px solid var(--accent-gold); outline-offset: 2px; }

.btn-secondary {
  background: transparent;
  color: var(--accent-secondary);
  padding: 8px 20px;
  border-radius: 12px;
  font-weight: 700;
  border: 2px solid var(--accent-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.btn-secondary:hover { background: var(--accent-secondary); color: #fff; }
.btn-secondary:focus { outline: 3px solid var(--accent-gold); outline-offset: 2px; }

.scene-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.85em;
  font-weight: 700;
}

.progress-bar {
  height: 8px;
  border-radius: 99px;
  background: var(--bg-secondary);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 99px;
  background: linear-gradient(90deg, var(--accent-primary), var(--accent-gold));
  transition: width 0.6s ease;
}

.passage-block {
  border-left: 4px solid var(--accent-primary);
  padding: 16px 20px;
  margin: 12px 0;
  background: rgba(230,57,70,0.07);
  border-radius: 0 12px 12px 0;
  font-style: italic;
  line-height: 1.8;
}

.modern-translation {
  display: none;
  background: rgba(212,165,116,0.12);
  border-left: 4px solid var(--accent-secondary);
  padding: 14px 18px;
  border-radius: 0 12px 12px 0;
  margin: 8px 0;
}
.modern-translation.show { display: block; animation: fadeSlide 0.3s ease; }

.scaffold-box {
  background: rgba(244,197,66,0.1);
  border: 1px dashed var(--accent-gold);
  border-radius: 12px;
  padding: 14px 18px;
  margin: 10px 0;
}

.hint-btn {
  background: var(--accent-gold);
  color: #1a1a1a;
  border: none;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 700;
  font-size: 0.85em;
}

.drag-item {
  padding: 10px 16px;
  border-radius: 10px;
  background: var(--bg-secondary);
  border: 2px solid var(--border-color);
  cursor: grab;
  user-select: none;
  transition: all 0.2s;
  touch-action: none;
}
.drag-item:active, .drag-item.dragging { 
  opacity: 0.7; 
  cursor: grabbing;
  transform: scale(1.05);
}
.drag-item.correct { border-color: var(--success); background: rgba(74,222,128,0.15); }
.drag-item.incorrect { border-color: var(--error); background: rgba(248,113,113,0.15); }

.drop-zone {
  min-height: 48px;
  border: 2px dashed var(--border-color);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  padding: 8px;
}
.drop-zone.drag-over { border-color: var(--accent-primary); background: rgba(230,57,70,0.1); }
.drop-zone.filled { border-style: solid; }

.mc-option {
  padding: 12px 18px;
  border-radius: 12px;
  border: 2px solid var(--border-color);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  width: 100%;
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: inherit;
}
.mc-option:hover { border-color: var(--accent-primary); }
.mc-option:focus { outline: 3px solid var(--accent-gold); outline-offset: 2px; }
.mc-option.selected { border-color: var(--accent-primary); background: rgba(230,57,70,0.15); }
.mc-option.correct { border-color: var(--success); background: rgba(74,222,128,0.15); }
.mc-option.wrong { border-color: var(--error); background: rgba(248,113,113,0.15); }

.cer-textarea {
  width: 100%;
  min-height: 120px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  border: 2px solid var(--border-color);
  border-radius: 12px;
  padding: 14px;
  font-size: inherit;
  font-family: inherit;
  resize: vertical;
  line-height: 1.7;
}
.cer-textarea:focus { outline: none; border-color: var(--accent-primary); }

.tab-btn {
  padding: 10px 20px;
  border-radius: 10px 10px 0 0;
  border: 2px solid var(--border-color);
  border-bottom: none;
  cursor: pointer;
  font-weight: 700;
  background: var(--bg-secondary);
  color: var(--text-secondary);
  transition: all 0.2s;
}
.tab-btn.active { background: var(--bg-card); color: var(--accent-primary); border-color: var(--accent-primary); }
.tab-btn:focus { outline: 3px solid var(--accent-gold); outline-offset: 2px; }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  padding: 14px 28px;
  border-radius: 12px;
  font-weight: 700;
  z-index: 9999;
  transition: transform 0.4s ease;
  color: #fff;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--success); color: #1a1a1a; }
.toast.error { background: var(--error); }
.toast.info { background: var(--accent-primary); }

.nav-item {
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-secondary);
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  font-size: inherit;
}
.nav-item:hover, .nav-item.active { background: rgba(230,57,70,0.15); color: var(--accent-primary); }
.nav-item:focus { outline: 3px solid var(--accent-gold); outline-offset: 2px; }

@keyframes fadeSlide { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
@keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
@keyframes confetti {
  0% { transform: translateY(0) rotate(0deg); opacity:1; }
  100% { transform: translateY(-60px) rotate(360deg); opacity:0; }
}

.animate-in { animation: fadeSlide 0.4s ease; }

.sr-only { position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0; }

@media print {
  body { background: #fff !important; color: #000 !important; }
  .no-print { display: none !important; }
  .glass-card { border: 1px solid #ccc !important; box-shadow: none !important; background: #fff !important; }
  .passage-block { background: #f5f5f5 !important; }
}

.speaking-prompt {
  background: linear-gradient(135deg, rgba(230,57,70,0.1), rgba(212,165,116,0.1));
  border: 2px solid var(--accent-secondary);
  border-radius: 16px;
  padding: 20px;
}

.sentence-frame {
  background: rgba(244,197,66,0.08);
  border: 1px solid var(--accent-gold);
  border-radius: 10px;
  padding: 12px 16px;
  font-style: italic;
  color: var(--text-secondary);
}

.week-header {
  background: linear-gradient(135deg, var(--accent-primary), #8b1a2b);
  color: #fff;
  padding: 16px 24px;
  border-radius: 14px;
  font-weight: 800;
}

.ccss-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 0.75em;
  font-weight: 700;
  background: rgba(244,197,66,0.2);
  color: var(--accent-gold);
  border: 1px solid var(--accent-gold);
}

.linear-scale {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.linear-option {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-weight: 700;
  background: var(--bg-secondary);
  color: var(--text-primary);
  transition: all 0.2s;
}
.linear-option:hover { border-color: var(--accent-primary); }
.linear-option.selected { background: var(--accent-primary); color: #fff; border-color: var(--accent-primary); }
.linear-option:focus { outline: 3px solid var(--accent-gold); outline-offset: 2px; }

.sidebar-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 40;
}
.sidebar-overlay.show { display: block; }

@media (max-width: 768px) {
  .sidebar { 
    position: fixed;
    left: -280px;
    top: 0;
    bottom: 0;
    z-index: 50;
    transition: left 0.3s ease;
    width: 270px;
  }
  .sidebar.open { left: 0; }
}
</style>

 </head>
 <body class="font-body h-full">
  <div id="app-root" class="h-full w-full flex flex-col overflow-auto" style="background:var(--bg-primary); color:var(--text-primary);">
   <!-- Top Bar -->
   <header class="no-print flex items-center justify-between px-4 py-3 flex-shrink-0" style="background:var(--bg-secondary); border-bottom:1px solid var(--border-color);">
    <div class="flex items-center gap-3">
     <button id="menu-toggle" class="md:hidden p-2 rounded-lg" style="color:var(--text-primary); background:transparent; border:none; cursor:pointer;" aria-label="Toggle menu"> <i data-lucide="menu" style="width:24px;height:24px;"></i> </button> <span style="font-size:1.6em;" aria-hidden="true">🌹</span>
     <h1 id="main-title" class="font-literary" style="font-size:1.3em; font-weight:700; color:var(--accent-primary);"></h1>
    </div>
    <div class="flex items-center gap-2 flex-wrap">
     <button id="theme-toggle" class="btn-secondary" style="font-size:0.8em; padding:6px 14px;" aria-label="Toggle readable theme"> <i data-lucide="eye" style="width:16px;height:16px;display:inline;vertical-align:middle;"></i> <span class="hidden sm:inline"> Readable</span> </button> <button id="dyslexic-toggle" class="btn-secondary" style="font-size:0.8em; padding:6px 14px;" aria-label="Toggle dyslexia-friendly font"> <span style="font-family:'OpenDyslexic',sans-serif;">Aa</span> </button>
     <div class="flex items-center gap-1" role="group" aria-label="Font size controls">
      <button id="font-down" class="btn-secondary" style="padding:4px 10px; font-size:0.8em;" aria-label="Decrease font size">A-</button> <span id="font-size-display" style="font-size:0.8em; min-width:32px; text-align:center; color:var(--text-secondary);">16</span> <button id="font-up" class="btn-secondary" style="padding:4px 10px; font-size:0.8em;" aria-label="Increase font size">A+</button>
     </div>
    </div>
   </header>
   <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay" role="presentation"></div><!-- Sidebar Nav -->
    <nav id="sidebar" class="sidebar no-print flex-shrink-0 overflow-y-auto" style="width:260px; background:var(--bg-secondary); border-right:1px solid var(--border-color); padding:16px;" aria-label="Scene navigation">
     <div style="margin-bottom:16px;">
      <p id="welcome-msg" style="font-size:0.9em; color:var(--text-secondary); margin-bottom:4px;"></p>
      <p id="teacher-display" style="font-size:0.8em; color:var(--text-secondary); margin-bottom:12px;"></p>
      <div style="background:rgba(230,57,70,0.1); padding:10px; border-radius:10px; border:1px solid var(--accent-primary);"><label style="font-size:0.8em; font-weight:700; color:var(--text-secondary); display:block; margin-bottom:4px;">Student Name:</label> <input type="text" id="student-name" placeholder="Your name" style="width:100%; padding:6px; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-secondary); color:var(--text-primary); font-size:0.85em; margin-bottom:8px;" oninput="saveStudentInfo()"> <label style="font-size:0.8em; font-weight:700; color:var(--text-secondary); display:block; margin-bottom:4px;">Period:</label> <input type="text" id="student-period" placeholder="E.g., Period 3" style="width:100%; padding:6px; border:1px solid var(--border-color); border-radius:6px; background:var(--bg-secondary); color:var(--text-primary); font-size:0.85em;" oninput="saveStudentInfo()">
      </div>
     </div>
     <div class="progress-bar" style="margin-bottom:16px;">
      <div id="overall-progress" class="progress-fill" style="width:0%;"></div>
     </div>
     <p id="progress-text" style="font-size:0.8em; color:var(--text-secondary); margin-bottom:16px;">0 / 8 scenes completed</p>
     <div id="nav-list" role="list" style="display:flex; flex-direction:column; gap:4px;">
     </div>
     <div style="margin-top:24px; padding-top:16px; border-top:1px solid var(--border-color);">
      <button id="save-all-btn" class="btn-primary" style="width:100%; font-size:0.85em; margin-bottom:8px;"> <i data-lucide="save" style="width:16px;height:16px;display:inline;vertical-align:middle;"></i> Save Progress </button>
     </div>
    </nav><!-- Main Content -->
    <main id="main-content" class="flex-1 overflow-y-auto" style="padding:24px;" role="main">
     <div id="scene-content" style="max-width:900px; margin:0 auto;">
      <!-- Dynamic content loads here -->
     </div>
    </main>
   </div>
  </div>
  <div id="toast" class="toast" role="alert" aria-live="polite"></div>
  <script>
// ============================================================
// SCENE DATA - Comprehensive Romeo & Juliet curriculum
// ============================================================

const SCENES = [
  {
    id: "prologue",
    title: "The Prologue",
    subtitle: "The Set-Up",
    week: 1,
    act: "Prologue",
    icon: "scroll",
    color: "#e63946",
    ccss: ["RL.9-10.1","RL.9-10.2","RL.9-10.4","RL.9-10.5","SL.9-10.1"],
    summary: "A narrator explains that two powerful families in Verona are trapped in a deadly feud that only the death of their children will end.",
    passages: [
      {
        original: "Two households, both alike in dignity,\nIn fair Verona, where we lay our scene,\nFrom ancient grudge break to new mutiny,\nWhere civil blood makes civil hands unclean.\nFrom forth the fatal loins of these two foes\nA pair of star-cross'd lovers take their life;\nWhose misadventured piteous overthrows\nDo with their death bury their parents' strife.\nThe fearful passage of their death-mark'd love,\nAnd the continuance of their parents' rage,\nWhich, but their children's end, nought could remove,\nIs now the two hours' traffic of our stage;\nThe which if you with patient ears attend,\nWhat here shall miss, our toil shall strive to mend.",
        modern: "Two equally powerful families in beautiful Verona are at war. Their old hatred keeps erupting into new violence, staining everyone's hands with blood. From these two enemy families, two doomed lovers are born — and they will die. Only when their children die will the parents finally stop fighting. This tragic love story, and the rage that nothing else could stop, is what we're about to show you. Listen carefully, and we'll do our best to tell it well.",
        label: "The Complete Prologue (Sonnet)"
      }
    ],
    activities: {
      dragDrop: {
        title: "🧩 Match the Shakespearean Words",
        instructions: "Drag each Shakespearean word to its modern meaning.",
        ccss: "RL.9-10.4",
        pairs: [
          { term: "mutiny", def: "rebellion / fighting" },
          { term: "star-cross'd", def: "doomed by fate" },
          { term: "civil", def: "belonging to citizens" },
          { term: "strife", def: "conflict / struggle" },
          { term: "piteous", def: "deserving of pity" }
        ]
      },
      multipleChoice: {
        title: "📝 Comprehension Check",
        ccss: "RL.9-10.1",
        questions: [
          {
            q: "According to the Prologue, what will end the feud between the two families?",
            options: ["A peace treaty","The death of the lovers","A marriage arrangement","The Prince's command"],
            correct: 1,
            hint: "Look at the lines about 'star-cross'd lovers' and what 'bury their parents' strife.'"
          },
          {
            q: "What does 'star-cross'd' most likely mean?",
            options: ["Blessed by the stars","Traveling across stars","Doomed by fate","Famous like stars"],
            correct: 2,
            hint: "Think about what happens to the lovers. Does their fate seem lucky or unlucky?"
          },
          {
            q: "The Prologue is written in what poetic form?",
            options: ["Free verse","Haiku","Sonnet (14 lines)","Limerick"],
            correct: 2,
            hint: "Count the lines. This form has exactly 14 lines with a specific rhyme scheme."
          }
        ]
      },
      cer: {
        title: "✍️ CER Response: Fate vs. Free Will",
        ccss: "W.9-10.1",
        prompt: "Based on the Prologue, does Shakespeare suggest that Romeo and Juliet's fate is predetermined, or do they have free will? Use evidence from the text to support your claim.",
        sentenceFrames: {
          claim: "Based on the Prologue, Shakespeare suggests that Romeo and Juliet's fate is _____ because _____.",
          evidence: "In the Prologue, Shakespeare writes, '_____ ,' which shows that _____.",
          reasoning: "This evidence supports my claim because _____. The word(s) '_____ ' specifically suggest(s) that _____."
        },
        scaffoldTips: [
          "Look for words that suggest destiny: 'star-cross'd,' 'fatal,' 'death-mark'd'",
          "Consider: Does 'take their life' mean they choose, or is it decided for them?",
          "Think about whether the audience knowing the ending changes how we see their choices."
        ]
      },
      linear: {
        title: "📊 Rate Your Understanding",
        ccss: "SL.9-10.1",
        questions: [
          { q: "How well do you understand the main conflict introduced in the Prologue?", scale: 5 },
          { q: "How confident are you in identifying literary devices in the Prologue?", scale: 5 }
        ]
      },
      speaking: {
        title: "🎤 Discussion Circle",
        ccss: "SL.9-10.1",
        prompts: [
          "Think of two families or groups in your community (or in media) that have a long-running rivalry. How does it compare to the Montagues and Capulets?",
          "The Prologue tells us the ending before the play even starts. Why do you think Shakespeare does this? How does it change the experience of watching?"
        ],
        frames: [
          "I think Shakespeare reveals the ending because _____.",
          "A rivalry I can compare this to is _____ because _____.",
          "I agree/disagree with _____ because _____.",
          "Building on what _____ said, I also think _____."
        ]
      }
    }
  },
  {
    id: "act1scene1",
    title: "Act 1, Scene 1",
    subtitle: "The Brawl",
    week: 1,
    act: "Act 1",
    icon: "swords",
    color: "#dc2626",
    ccss: ["RL.9-10.1","RL.9-10.3","RL.9-10.4","SL.9-10.1","W.9-10.1"],
    summary: "A petty insult between servants escalates into a violent street fight, establishing the high stakes and danger of the family grudge.",
    passages: [
      {
        original: "SAMPSON: I will bite my thumb at them, which is a disgrace to them if they bear it.\nABRAHAM: Do you bite your thumb at us, sir?\nSAMPSON: I do bite my thumb, sir.\nABRAHAM: Do you bite your thumb at us, sir?\nSAMPSON: [aside to Gregory] Is the law of our side if I say 'ay'?\nGREGORY: No.\nSAMPSON: No, sir. I do not bite my thumb at you, sir, but I bite my thumb, sir.",
        modern: "SAMPSON: I'm going to make a rude gesture at them — it's basically like flipping them off.\nABRAHAM: Are you disrespecting us?\nSAMPSON: I am making the gesture, yes.\nABRAHAM: But are you doing it AT us?\nSAMPSON: [whispering] Will I get in trouble if I say yes?\nGREGORY: Yes.\nSAMPSON: No sir. I'm just doing it in general. Not at you specifically.",
        label: "The Thumb-Biting Insult"
      },
      {
        original: "PRINCE: Three civil brawls, bred of an airy word,\nBy thee, old Capulet, and Montague,\nHave thrice disturb'd the quiet of our streets.\nIf ever you disturb our streets again,\nYour lives shall pay the forfeit of the peace.",
        modern: "PRINCE: Three times now, pointless arguments started by you, Capulet, and you, Montague, have turned into street fights that destroyed the peace of our city. If it happens again, you will pay with your lives.",
        label: "The Prince's Warning"
      }
    ],
    activities: {
      dragDrop: {
        title: "🧩 Escalation Timeline",
        instructions: "Put these events in the correct order from first to last.",
        ccss: "RL.9-10.3",
        pairs: [
          { term: "1st", def: "Sampson bites his thumb" },
          { term: "2nd", def: "Abraham confronts Sampson" },
          { term: "3rd", def: "Servants begin fighting" },
          { term: "4th", def: "Benvolio tries to stop it" },
          { term: "5th", def: "The Prince threatens death" }
        ]
      },
      multipleChoice: {
        title: "📝 Comprehension Check",
        ccss: "RL.9-10.1",
        questions: [
          {
            q: "Why does Sampson hesitate before admitting he's biting his thumb at Abraham?",
            options: ["He forgot why he's doing it","He's worried about getting in legal trouble","He's scared of Abraham","He wants to be friends"],
            correct: 1,
            hint: "Listen to what Sampson whispers to Gregory. What does he ask about?"

// ============================================================
// CORE APP
// ============================================================

function initApp() {
  document.getElementById('main-title').textContent = defaultConfig.hub_title;
  document.getElementById('welcome-msg').textContent = defaultConfig.welcome_message;
  document.body.style.fontSize = `${defaultConfig.font_size}px`;

  buildNav();
  renderScene(0);
  setupControls();
  lucide.createIcons();
}

function buildNav() {
  const nav = document.getElementById('nav-list');
  nav.innerHTML = '';
  let lastWeek = 0;
  SCENES.forEach((s, i) => {
    if (s.week !== lastWeek) {
      lastWeek = s.week;
      const wk = document.createElement('div');
      wk.className = 'week-header';
      wk.style.cssText = 'margin-bottom:6px; margin-top:' + (i > 0 ? '12px' : '0') + '; font-size:0.85em; padding:8px 14px;';
      wk.textContent = `Week ${s.week}`;
      nav.appendChild(wk);
    }
    const btn = document.createElement('button');
    btn.className = 'nav-item' + (i === currentScene ? ' active' : '');
    btn.setAttribute('role', 'listitem');
    btn.dataset.index = i;
    btn.innerHTML = `<i data-lucide="${s.icon}" style="width:18px;height:18px;flex-shrink:0;"></i><span style="font-size:0.85em; line-height:1.3;">${s.title}<br><span style="font-size:0.8em; opacity:0.7;">${s.subtitle}</span></span>`;
    btn.addEventListener('click', () => {
      currentScene = i;
      renderScene(i);
      closeSidebar();
    });
    nav.appendChild(btn);
  });
}

function setupControls() {
  document.getElementById('theme-toggle').addEventListener('click', () => {
    isReadableTheme = !isReadableTheme;
    document.body.classList.toggle('theme-readable', isReadableTheme);
    showToast(isReadableTheme ? 'Readable theme activated' : 'Tragic Love theme activated', 'info');
  });

  document.getElementById('dyslexic-toggle').addEventListener('click', () => {
    isDyslexicFont = !isDyslexicFont;
    document.body.classList.toggle('font-dyslexic', isDyslexicFont);
    showToast(isDyslexicFont ? 'OpenDyslexic font ON' : 'Standard font restored', 'info');
  });

  document.getElementById('font-up').addEventListener('click', () => {
    let sz = parseInt(document.body.style.fontSize) || 16;
    if (sz < 28) { sz += 2; document.body.style.fontSize = sz + 'px'; document.getElementById('font-size-display').textContent = sz; }
    if (window.elementSdk) window.elementSdk.setConfig({ font_size: sz });
  });

  document.getElementById('font-down').addEventListener('click', () => {
    let sz = parseInt(document.body.style.fontSize) || 16;
    if (sz > 12) { sz -= 2; document.body.style.fontSize = sz + 'px'; document.getElementById('font-size-display').textContent = sz; }
    if (window.elementSdk) window.elementSdk.setConfig({ font_size: sz });
  });

  document.getElementById('save-all-btn').addEventListener('click', () => {
    localStorage.setItem('rj_local_state', JSON.stringify(localState));
    showToast('Progress saved locally!', 'success');
  });

  document.getElementById('menu-toggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('show');
  });

  document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

  // Student info inputs
  document.getElementById('student-name').addEventListener('change', saveStudentInfo);
  document.getElementById('student-period').addEventListener('change', saveStudentInfo);

  // Load local state
  const saved = localStorage.getItem('rj_local_state');
  if (saved) { 
    try { 
      localState = JSON.parse(saved);
      document.getElementById('student-name').value = localState.studentName || '';
      document.getElementById('student-period').value = localState.studentPeriod || '';
    } catch(e) {} 
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

function saveStudentInfo() {
  localState.studentName = document.getElementById('student-name').value;
  localState.studentPeriod = document.getElementById('student-period').value;
  saveLocalState();
}

function updateProgressUI() {
  const completedScenes = new Set(allResponses.filter(r => r.completed).map(r => r.scene_id));
  const pct = Math.round((completedScenes.size / SCENES.length) * 100);
  document.getElementById('overall-progress').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${completedScenes.size} / ${SCENES.length} scenes completed`;
}

function renderScene(index) {
  const scene = SCENES[index];
  const container = document.getElementById('scene-content');
  
  // Update nav active state
  document.querySelectorAll('.nav-item').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  let html = `<div class="animate-in">`;
  
  // Scene Header
  html += `<div class="glass-card" style="padding:28px; margin-bottom:24px;">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px;">
      <span class="scene-badge" style="background:${scene.color}22; color:${scene.color}; border:1px solid ${scene.color};">${scene.act}</span>
      <span style="font-size:0.9em; color:var(--text-secondary);">Week ${scene.week}</span>
      ${scene.ccss.map(c => `<span class="ccss-badge">${c}</span>`).join('')}
    </div>
    <h2 class="font-literary" style="font-size:2em; font-weight:700; margin-bottom:8px; color:${scene.color};">
      <i data-lucide="${scene.icon}" style="width:28px;height:28px;display:inline;vertical-align:middle;"></i>
      ${scene.title}: ${scene.subtitle}
    </h2>
    <p style="font-size:1.05em; line-height:1.7; color:var(--text-secondary);">${scene.summary}</p>
  </div>`;

  // Passages
  html += `<div class="glass-card" style="padding:24px; margin-bottom:24px;">
    <h3 class="font-literary" style="font-size:1.4em; font-weight:700; margin-bottom:16px;">
      <i data-lucide="book-open" style="width:22px;height:22px;display:inline;vertical-align:middle;"></i>
      Key Passages
    </h3>`;
  
  scene.passages.forEach((p, pi) => {
    html += `<div style="margin-bottom:20px;">
      <h4 style="font-weight:700; margin-bottom:8px; color:var(--accent-secondary);">${p.label}</h4>
      <div class="passage-block font-literary" style="white-space:pre-line; font-size:1.05em;">${p.original}</div>
      <button class="hint-btn" onclick="toggleTranslation('trans-${index}-${pi}')" style="margin-top:8px;">
        <i data-lucide="languages" style="width:14px;height:14px;display:inline;vertical-align:middle;"></i> Click to See Modern Translation
      </button>
      <div id="trans-${index}-${pi}" class="modern-translation" style="font-size:1em; line-height:1.7;">${p.modern}</div>
    </div>`;
  });
  html += `</div>`;

  // Activity Tabs
  const activities = scene.activities;
  const tabIds = Object.keys(activities);
  const tabLabels = { dragDrop: "🧩 Match", multipleChoice: "📝 Quiz", cer: "✍️ Write", linear: "📊 Rate", speaking: "🎤 Discuss" };

  html += `<div class="no-print" style="margin-bottom:24px;">
    <div style="display:flex; gap:4px; flex-wrap:wrap; margin-bottom:0;">
      ${tabIds.map((t, ti) => `<button class="tab-btn ${ti === 0 ? 'active' : ''}" data-tab="${t}" data-scene="${index}" onclick="switchTab(this, '${t}', ${index})">${tabLabels[t] || t}</button>`).join('')}
    </div>
    <div class="glass-card" style="border-radius:0 16px 16px 16px; padding:24px;">
      ${tabIds.map((t, ti) => `<div id="tab-${index}-${t}" style="display:${ti === 0 ? 'block' : 'none'};">${renderActivity(t, activities[t], index, scene)}</div>`).join('')}
    </div>
  </div>`;

  // Save to PDF & Navigation
  html += `<div class="no-print" style="display:flex; gap:12px; flex-wrap:wrap; justify-content:space-between; margin-bottom:40px;">
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      ${index > 0 ? `<button class="btn-secondary" onclick="navScene(${index - 1})"><i data-lucide="arrow-left" style="width:16px;height:16px;display:inline;vertical-align:middle;"></i> Previous</button>` : ''}
      ${index < SCENES.length - 1 ? `<button class="btn-primary" onclick="navScene(${index + 1})">Next Scene <i data-lucide="arrow-right" style="width:16px;height:16px;display:inline;vertical-align:middle;"></i></button>` : ''}
    </div>
    <div style="display:flex; gap:12px; flex-wrap:wrap;">
      <button class="btn-primary" onclick="markComplete('${scene.id}')" style="background:var(--success); color:#1a1a1a;">
        <i data-lucide="check-circle" style="width:16px;height:16px;display:inline;vertical-align:middle;"></i> Mark Complete
      </button>
      <button class="btn-secondary" onclick="saveToPDF(${index})">
        <i data-lucide="download" style="width:16px;height:16px;display:inline;vertical-align:middle;"></i> Save to PDF
      </button>
    </div>
  </div>`;

  html += `</div>`;
  container.innerHTML = html;
  
  // Re-initialize Lucide & drag-drop
  lucide.createIcons();
  initDragDrop(index);
  restoreState(index);
}

    const shuffledDefs = [...data.pairs].sort(() => Math.random() - 0.5);

    <div style="margin-bottom:16px;">
      <h4 style="font-weight:700; margin-bottom:8px;">🗣️ Sentence Starters for Discussion:</h4>

function toggleTranslation(id) {
  document.getElementById(id).classList.toggle('show');
}

function switchTab(btn, tab, sceneIdx) {
  btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const allTabs = Object.keys(SCENES[sceneIdx].activities);
  allTabs.forEach(t => {
    const el = document.getElementById(`tab-${sceneIdx}-${t}`);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
}

function showHint(btn, hint) {
  const existing = btn.parentElement.querySelector('.hint-shown');
  if (existing) { existing.remove(); return; }
  const div = document.createElement('div');
  div.className = 'hint-shown scaffold-box animate-in';
  div.innerHTML = `<strong>💡 Hint:</strong> ${hint}`;
  btn.after(div);
}

// Drag & Drop
function initDragDrop(sceneIdx) {
  const items = document.querySelectorAll(`.drag-item[data-scene="${sceneIdx}"]`);
  const zones = document.querySelectorAll(`.drop-zone[data-scene="${sceneIdx}"]`);

  items.forEach(item => {
    item.addEventListener('dragstart', (e) => {
      e.dataTransfer.setData('text/plain', item.id);
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    
    // Touch support
    let startX, startY, clone;
    item.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      startX = touch.clientX;
      startY = touch.clientY;
      item.classList.add('dragging');
    }, { passive: true });
    item.addEventListener('touchmove', (e) => {
      e.preventDefault();
    }, { passive: false });
    item.addEventListener('touchend', (e) => {
      item.classList.remove('dragging');
      const touch = e.changedTouches[0];
      const dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
      const zone = dropTarget?.closest('.drop-zone');
      if (zone && zone.dataset.scene == sceneIdx) {
        handleDrop(zone, item);
      }
    });
  });

  zones.forEach(zone => {
    zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', (e) => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      const itemId = e.dataTransfer.getData('text/plain');
      const item = document.getElementById(itemId);
      handleDrop(zone, item);
    });
  });
}

function handleDrop(zone, item) {
  // If zone already has an item, move it back to bank
  const existing = zone.querySelector('.drag-item');
  if (existing) {
    const bank = document.getElementById(`dd-bank-${zone.dataset.scene}`);
    bank.appendChild(existing);
  }
  zone.appendChild(item);
  zone.classList.add('filled');
}

function checkDragDrop(sceneIdx) {
  const scene = SCENES[sceneIdx];
  const pairs = scene.activities.dragDrop.pairs;
  let correct = 0;
  
  pairs.forEach((p, i) => {
    const zone = document.getElementById(`dz-${sceneIdx}-${i}`);
    const item = zone.querySelector('.drag-item');
    if (item) {
      const answer = parseInt(item.dataset.answer);
      if (answer === i) {
        item.classList.add('correct');
        item.classList.remove('incorrect');
        correct++;
      } else {
        item.classList.add('incorrect');
        item.classList.remove('correct');
      }
    }
  });

  const fb = document.getElementById(`dd-feedback-${sceneIdx}`);
  fb.innerHTML = `<div class="animate-in" style="padding:12px; border-radius:10px; background:${correct === pairs.length ? 'rgba(74,222,128,0.15)' : 'rgba(248,113,113,0.15)'}; font-weight:700;">${correct === pairs.length ? '🎉 Perfect!' : `${correct}/${pairs.length} correct. Try again!`}</div>`;

  localState.scores[`dd-${sceneIdx}`] = { correct, total: pairs.length };
  saveLocalState();
}

// Multiple Choice
function selectMC(btn, sceneIdx, qi, oi) {
  const siblings = btn.parentElement.querySelectorAll('.mc-option');
  siblings.forEach(s => s.classList.remove('selected'));
  btn.classList.add('selected');
  if (!localState.answers[sceneIdx]) localState.answers[sceneIdx] = {};
  localState.answers[sceneIdx][qi] = oi;
}

function checkMC(sceneIdx) {
  const scene = SCENES[sceneIdx];
  const questions = scene.activities.multipleChoice.questions;
  let correct = 0;

  questions.forEach((q, qi) => {
    const btns = document.querySelectorAll(`.mc-option[data-scene="${sceneIdx}"][data-q="${qi}"]`);
    const selected = localState.answers[sceneIdx]?.[qi];
    btns.forEach((b, bi) => {
      b.classList.remove('correct', 'wrong', 'selected');
      if (bi === q.correct) b.classList.add('correct');
      else if (bi === selected && selected !== q.correct) b.classList.add('wrong');
      b.disabled = true;
    });
    if (selected === q.correct) correct++;

    const fb = document.getElementById(`mc-feedback-${sceneIdx}-${qi}`);
    if (selected === q.correct) {
      fb.innerHTML = `<span class="animate-in" style="color:var(--success); font-weight:700;">✅ Correct!</span>`;
    } else if (selected !== undefined) {
      fb.innerHTML = `<span class="animate-in" style="color:var(--error); font-weight:700;">❌ The answer is: ${String.fromCharCode(65 + q.correct)}. ${q.options[q.correct]}</span>`;
    }
  });

  const scoreDiv = document.getElementById(`mc-score-${sceneIdx}`);
  scoreDiv.innerHTML = `<div class="animate-in" style="padding:14px; border-radius:10px; background:${correct === questions.length ? 'rgba(74,222,128,0.15)' : 'rgba(244,197,66,0.15)'}; font-weight:700; font-size:1.1em;">Score: ${correct}/${questions.length} ${correct === questions.length ? '🎉 Perfect!' : '— Review the highlighted answers above.'}</div>`;

  localState.scores[`mc-${sceneIdx}`] = { correct, total: questions.length };
  saveLocalState();
  saveResponseToSDK(SCENES[sceneIdx].id, 'multiple_choice', 'mc', JSON.stringify(localState.answers[sceneIdx] || {}), correct, questions.length);
}

// CER
function saveCERLocal(sceneIdx, part, value) {
  if (!localState.cerTexts[sceneIdx]) localState.cerTexts[sceneIdx] = {};
  localState.cerTexts[sceneIdx][part] = value;
}

async function submitCER(sceneIdx) {
  const claim = document.getElementById(`cer-${sceneIdx}-claim`)?.value || '';
  const evidence = document.getElementById(`cer-${sceneIdx}-evidence`)?.value || '';
  const reasoning = document.getElementById(`cer-${sceneIdx}-reasoning`)?.value || '';
  
  if (!claim.trim() && !evidence.trim() && !reasoning.trim()) {
    showToast('Please write at least one part of your CER response.', 'error');
    return;
  }

  const score = (claim.trim() ? 1 : 0) + (evidence.trim() ? 1 : 0) + (reasoning.trim() ? 1 : 0);
  const fb = document.getElementById(`cer-feedback-${sceneIdx}`);
  fb.innerHTML = `<div class="animate-in scaffold-box"><strong>✅ Response saved!</strong> You completed ${score}/3 parts. ${score === 3 ? '🎉 Full CER response!' : 'Keep going — complete all three parts for full credit.'}</div>`;

  localState.cerTexts[sceneIdx] = { claim, evidence, reasoning };
  localState.scores[`cer-${sceneIdx}`] = { correct: score, total: 3 };
  saveLocalState();
  saveResponseToSDK(SCENES[sceneIdx].id, 'cer', 'cer', `C: ${claim} | E: ${evidence} | R: ${reasoning}`, score, 3);
}

// Linear
function selectLinear(btn, sceneIdx, qi, val) {
  const siblings = btn.parentElement.querySelectorAll('.linear-option');
  siblings.forEach(s => s.classList.remove('selected'));
  btn.classList.add('selected');
  if (!localState.linearSelections[sceneIdx]) localState.linearSelections[sceneIdx] = {};
  localState.linearSelections[sceneIdx][qi] = val;
}

async function saveLinear(sceneIdx) {
  const fb = document.getElementById(`linear-feedback-${sceneIdx}`);
  fb.innerHTML = `<div class="animate-in" style="color:var(--success); font-weight:700;">✅ Ratings saved!</div>`;
  saveLocalState();
  const data = JSON.stringify(localState.linearSelections[sceneIdx] || {});
  saveResponseToSDK(SCENES[sceneIdx].id, 'linear', 'linear', data, 0, 0);
}

// Speaking
function saveSpeakLocal(sceneIdx, value) {
  if (!localState.cerTexts[`speak-${sceneIdx}`]) localState.cerTexts[`speak-${sceneIdx}`] = '';
  localState.cerTexts[`speak-${sceneIdx}`] = value;
}

async function saveSpeaking(sceneIdx) {
  const text = document.getElementById(`speak-${sceneIdx}`)?.value || '';
  if (!text.trim()) {
    showToast('Write some discussion notes first!', 'error');
    return;
  }
  const fb = document.getElementById(`speak-feedback-${sceneIdx}`);
  fb.innerHTML = `<div class="animate-in" style="color:var(--success); font-weight:700;">✅ Discussion notes saved!</div>`;
  localState.cerTexts[`speak-${sceneIdx}`] = text;
  saveLocalState();
  saveResponseToSDK(SCENES[sceneIdx].id, 'speaking', 'speaking', text, 1, 1);
}

// ============================================================
// DATA SDK SAVE
// ============================================================

async function saveResponseToSDK(sceneId, activityType, questionId, answer, score, maxScore) {
  if (!window.dataSdk) return;
  
  // Check for existing response
  const existing = allResponses.find(r => r.scene_id === sceneId && r.activity_type === activityType && r.question_id === questionId);
  
  if (existing) {
    const result = await window.dataSdk.update({
      ...existing,
      student_answer: answer,
      score: score,
      max_score: maxScore,
      completed: true,
      timestamp: new Date().toISOString()
    });
    if (result.isOk) showToast('Progress updated!', 'success');
  } else {
    if (allResponses.length >= 999) {
      showToast('Storage limit reached. Please delete some old responses.', 'error');
      return;
    }
    const result = await window.dataSdk.create({
      scene_id: sceneId,
      activity_type: activityType,
      question_id: questionId,
      student_answer: answer,
      score: score,
      max_score: maxScore,
      completed: true,
      timestamp: new Date().toISOString()
    });
    if (result.isOk) showToast('Response saved!', 'success');
    else showToast('Could not save — try again.', 'error');
  }
}

async function markComplete(sceneId) {
  if (!window.dataSdk) { showToast('Scene marked complete!', 'success'); return; }
  const existing = allResponses.find(r => r.scene_id === sceneId && r.activity_type === 'completion');
  if (existing) {
    showToast('Already marked complete! ✅', 'info');
    return;
  }
  if (allResponses.length >= 999) { showToast('Storage limit reached.', 'error'); return; }
  const result = await window.dataSdk.create({
    scene_id: sceneId,
    activity_type: 'completion',
    question_id: 'complete',
    student_answer: 'completed',
    score: 1,
    max_score: 1,
    completed: true,
    timestamp: new Date().toISOString()
  });
  if (result.isOk) showToast('🎉 Scene marked complete!', 'success');
}

// ============================================================
// STATE MANAGEMENT
// ============================================================

function saveLocalState() {
  localStorage.setItem('rj_local_state', JSON.stringify(localState));
}

function restoreState(sceneIdx) {
  // Restore MC selections
  if (localState.answers[sceneIdx]) {
    Object.entries(localState.answers[sceneIdx]).forEach(([qi, oi]) => {
      const btn = document.querySelector(`.mc-option[data-scene="${sceneIdx}"][data-q="${qi}"][data-opt="${oi}"]`);
      if (btn) btn.classList.add('selected');
    });
  }
  // Restore CER text
  if (localState.cerTexts[sceneIdx]) {
    ['claim', 'evidence', 'reasoning'].forEach(p => {
      const ta = document.getElementById(`cer-${sceneIdx}-${p}`);
      if (ta && localState.cerTexts[sceneIdx][p]) ta.value = localState.cerTexts[sceneIdx][p];
    });
  }
  // Restore speaking
  const speakTA = document.getElementById(`speak-${sceneIdx}`);
  if (speakTA && localState.cerTexts[`speak-${sceneIdx}`]) speakTA.value = localState.cerTexts[`speak-${sceneIdx}`];
  // Restore linear
  if (localState.linearSelections[sceneIdx]) {
    Object.entries(localState.linearSelections[sceneIdx]).forEach(([qi, val]) => {
      const btn = document.querySelector(`.linear-option[data-scene="${sceneIdx}"][data-lq="${qi}"][data-val="${val}"]`);
      if (btn) btn.classList.add('selected');
    });
  }
}

  const mcScore = localState.scores[`mc-${sceneIdx}`];
  if (mcScore) {
    content += `<h2>📝 Quiz Score</h2><div class="score">Score: ${mcScore.correct}/${mcScore.total}</div>`;
  }

  // DD Scores
  const ddScore = localState.scores[`dd-${sceneIdx}`];
  if (ddScore) {
    content += `<h2>🧩 Matching Score</h2><div class="score">Score: ${ddScore.correct}/${ddScore.total}</div>`;
  }

  // CER
  const cer = localState.cerTexts[sceneIdx];
  if (cer) {
    content += `<h2>✍️ CER Response</h2>`;
    content += `<div class="response"><span class="label">Claim:</span><br>${cer.claim || '<em>Not completed</em>'}</div>`;
    content += `<div class="response"><span class="label">Evidence:</span><br>${cer.evidence || '<em>Not completed</em>'}</div>`;
    content += `<div class="response"><span class="label">Reasoning:</span><br>${cer.reasoning || '<em>Not completed</em>'}</div>`;
    const cerScore = localState.scores[`cer-${sceneIdx}`];
    if (cerScore) content += `<div class="score">CER Score: ${cerScore.correct}/${cerScore.total} parts completed</div>`;
  }

  // Linear
  const lin = localState.linearSelections[sceneIdx];
  if (lin) {
    content += `<h2>📊 Self-Assessment</h2><table><tr><th>Question</th><th>Rating</th></tr>`;
    const linQs = scene.activities.linear.questions;
    Object.entries(lin).forEach(([qi, val]) => {
      content += `<tr><td>${linQs[qi]?.q || 'Question ' + qi}</td><td>${val} / ${linQs[qi]?.scale || 5}</td></tr>`;
    });
    content += `</table>`;
  }

  // Speaking
  const speak = localState.cerTexts[`speak-${sceneIdx}`];
  if (speak) {
    content += `<h2>🎤 Discussion Notes</h2><div class="response">${speak}</div>`;
  }

  content += `<hr><p style="text-align:center; color:#999; margin-top:40px;">Romeo & Juliet Learning Lab — Generated ${new Date().toLocaleString()}</p></body></html>`;

  const printWindow = window.open('', '_blank');
  if (printWindow) {
    printWindow.document.write(content);
    printWindow.document.close();
    printWindow.focus();
    setTimeout(() => printWindow.print(), 500);
  } else {
    showToast('Please allow pop-ups to save PDF.', 'error');
  }
}

// ============================================================
// NAVIGATION & TOAST
// ============================================================

function navScene(idx) {
  currentScene = idx;
  renderScene(idx);
  document.getElementById('main-content').scrollTop = 0;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
