<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5C's Lesson Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Poppins:wght@400;600;700&display=swap');

        :root {
            --bg-dark: #0b0f19;
            --neon-pink: #ff2e93;
            --neon-blue: #00f2fe;
            --neon-purple: #a855f7;
            --glass-bg: rgba(17, 24, 39, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Dynamic Neon Background Orbs --- */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -2;
            animation: floatOrb 10s infinite alternate ease-in-out;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: var(--neon-pink);
            top: -10%;
            left: -10%;
            opacity: 0.5;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--neon-blue);
            bottom: -20%;
            right: -10%;
            opacity: 0.4;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: var(--neon-purple);
            top: 40%;
            left: 40%;
            opacity: 0.3;
            animation-duration: 15s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -50px) scale(1.2); }
        }

        /* --- Floating 5C Core Values --- */
        .splash-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-word {
            position: absolute;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            /* Brighter white with low opacity for better contrast against neon */
            color: rgba(255, 255, 255, 0.08); 
            font-size: 3.5rem;
            animation: moveWord linear infinite alternate;
        }

        @keyframes moveWord {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-30px) rotate(3deg); }
        }

        /* --- Main Content Box --- */
        .hub-container {
            max-width: 650px;
            width: 100%;
            padding: 50px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
            position: relative;
            z-index: 10;
        }

        /* --- Vibrant Gradient Header --- */
        h2 {
            font-family: 'Montserrat', sans-serif;
            font-size: 3.5rem;
            margin-top: 0;
            margin-bottom: 40px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-pink), var(--neon-purple));
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 30px rgba(255, 46, 147, 0.3); /* Soft glow behind text */
        }

        .unit-list {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Neon Interactive Links --- */
        .unit-link {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            padding: 20px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffffff;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy transition */
            position: relative;
            overflow: hidden;
        }

        /* Glowing hover effect */
        .unit-link:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4), inset 0 0 10px rgba(0, 242, 254, 0.2);
            color: var(--neon-blue);
            letter-spacing: 1px;
        }

        /* --- Back Button --- */
        .back-btn {
            display: inline-block;
            margin-top: 40px;
            color: #94a3b8;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .back-btn:hover { 
            color: var(--neon-pink); 
            text-shadow: 0 0 10px rgba(255, 46, 147, 0.5);
        }

    </style>
</head>
<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="splash-layer">
        <div class="floating-word" style="top: 10%; left: 5%; animation-duration: 12s;">Communication</div>
        <div class="floating-word" style="top: 25%; right: 5%; animation-duration: 15s;">Character</div>
        <div class="floating-word" style="top: 55%; left: -5%; animation-duration: 18s;">Collaboration</div>
        <div class="floating-word" style="top: 75%; right: 5%; animation-duration: 14s;">Creativity</div>
        <div class="floating-word" style="top: 85%; left: 15%; animation-duration: 20s;">Critical-Thinking</div>
    </div>

    <div class="hub-container">
        <h2>5Cs & Class Culture</h2>

        <ul class="unit-list">
            <li class="unit-item">
                <a href="growthmindset.html" class="unit-link">Growth Mindset ➔</a>
            </li>
            <li class="unit-item">
                <a href="appgraphicorganizer.html" class="unit-link">App Building ➔</a>
            </li>
        
            <li class="unit-item">
                <a href="#" class="unit-link" style="opacity: 0.6;">Coming Soon: Team Project</a>
            </li>
        </ul>

        <a href="../index.html" class="back-btn">← Back to Main Menu</a>
    </div>

</body>
</html>
