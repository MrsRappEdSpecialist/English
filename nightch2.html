<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night Chapter 3 - Interactive Lesson</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --bg-color: #F4F9F9;
            --primary: #2EC4B6; 
            --secondary: #FF9F1C; 
            --accent: #E71D36; 
            --success: #2ecc71;
            --text-dark: #011627;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        h1, h2, h3 { color: var(--primary); }
        
        h1 {
            text-align: center;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 4px solid var(--secondary);
            padding-bottom: 10px;
        }

        .student-info {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 20px;
        }

        .student-info input {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--primary);
            border-radius: 8px;
            font-size: 1em;
        }

        .goals-box {
            background-color: #E8F7F6;
            border-left: 5px solid var(--primary);
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 0 8px 8px 0;
        }

        .section {
            background: #fff;
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .section h2 { margin-top: 0; display: flex; align-items: center; gap: 10px; }

        textarea, input[type="text"], select {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 2px solid #ccc;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        textarea:focus, input[type="text"]:focus, select:focus {
            border-color: var(--secondary);
            outline: none;
        }

        textarea { resize: vertical; min-height: 80px; }

        .tts-btn {
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            font-size: 1.2em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .tts-btn:hover { transform: scale(1.1); background-color: #e88e15; }

        .hint-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .hint-content {
            display: none;
            background-color: #FFF3E0;
            padding: 10px;
            border-left: 4px solid var(--secondary);
            margin-top: 10px;
            font-size: 0.9em;
            border-radius: 0 5px 5px 0;
        }

        .vocab-container {
            display: flex;
            gap: 20px;
            margin-top: 15px
