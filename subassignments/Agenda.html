<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  /* Spring-Themed Container */
  .spring-agenda-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 650px;
    margin: 30px auto;
    font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif; /* Friendly, teacher-like fonts */
  }

  /* Beautiful Spring Link Banner */
  .spring-link-banner {
    background-color: #fffacd; /* Lemon chiffon / soft yellow */
    color: #4a3320; /* Dark brown matching your image text */
    text-decoration: none;
    font-size: 1.25rem;
    font-weight: bold;
    padding: 15px 25px;
    border-radius: 30px; /* Highly rounded for a bubbly, floral feel */
    border: 3px dashed #ffb7c5; /* Soft pink dashed border */
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    margin-bottom: 25px;
    text-align: center;
    transition: all 0.3s ease;
  }

  /* Hover effect so it feels interactive when kids click */
  .spring-link-banner:hover {
    background-color: #ffb7c5; /* Turns pink on hover */
    color: #ffffff; /* Text turns white */
    border-color: #98fb98; /* Border turns pale green */
    transform: translateY(-3px); /* Slightly lifts up */
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
  }

  /* Image Styling */
  .agenda-image {
    width: 100%;
    height: auto;
    border-radius: 15px; /* Softens the corners of the image */
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15); /* Adds a nice drop shadow */
    border: 4px solid #b2d8d8; /* Soft mint green border */
  }
</style>
</head>
<body>

  <div class="spring-agenda-container">
    
   <a href="https://https://www.week3words.my.canva.site/subagenda" target="_blank">
  🌸 Click here to view Mrs. Rapp's Sub Agenda for today's instructions! 🌼
</a>
       <p><a href="../index.html" class="back-btn">← Return to the Main Classroom</a></p>

  </div>

</body>
